<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エアーホッケー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      padding: 8px 0;
    }
    canvas {
      display: block;
      min-width: 0;
      max-width: calc(100% - 8px);
      height: auto;
      touch-action: none;
      border-radius: 8px;
    }
    #bottom-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 12px;
    }
    #pause-btn {
      padding: 5px 14px;
      background: #0a1a2e;
      color: #4af;
      border: 1px solid #14568a;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #pause-btn:active { background: #0d2a4a; }
    #back {
      font-size: 13px;
      color: #445;
      text-decoration: none;
    }
    #back:hover { color: #aaa; }
  </style>
</head>
<body>
  <canvas id="canvas" width="420" height="620"></canvas>
  <div id="bottom-row">
    <a id="back" href="index.html">← ゲーム選択に戻る</a>
    <button id="pause-btn">⏸ ポーズ</button>
  </div>
  <script src="airhockey.js"></script>
</body>
</html>
