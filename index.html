<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゲームポータル</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1b2a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 {
      font-size: 28px;
      letter-spacing: 4px;
      color: #00e5ff;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 13px;
      color: #445;
      margin-bottom: 48px;
      letter-spacing: 2px;
    }
    .games {
      display: flex;
      gap: 32px;
    }
    .card {
      width: 220px;
      background: #111e2e;
      border: 1px solid #1e3a5a;
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: #00e5ff;
      box-shadow: 0 8px 32px rgba(0,229,255,0.15);
    }
    .card-preview {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      background: #0a1520;
    }
    .card-body {
      padding: 16px;
    }
    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #fff;
    }
    .card-desc {
      font-size: 12px;
      color: #6688aa;
      line-height: 1.6;
    }
    .card-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 3px 10px;
      font-size: 11px;
      border-radius: 20px;
      background: #1e3a5a;
      color: #00e5ff;
      letter-spacing: 1px;
    }
    @media (max-width: 540px) {
      h1 { font-size: 20px; letter-spacing: 2px; }
      .subtitle { margin-bottom: 28px; }
      .games { flex-direction: column; align-items: center; gap: 16px; }
      .card { width: min(340px, 92vw); }
    }
  </style>
</head>
<body>
  <h1>Game Portal</h1>
  <p class="subtitle">SELECT YOUR GAME</p>
  <div class="games">
    <a class="card" href="breakout.html">
      <div class="card-preview">🧱</div>
      <div class="card-body">
        <div class="card-title">ブロック崩し</div>
        <div class="card-desc">マウスまたはキーボードでパドルを操作してブロックを全て壊せ。</div>
        <span class="card-badge">BREAKOUT</span>
      </div>
    </a>
    <a class="card" href="tetris.html">
      <div class="card-preview">🟦</div>
      <div class="card-body">
        <div class="card-title">テトリス</div>
        <div class="card-desc">Sega アーケード (1988) 仕様。落下するテトロミノを並べてラインを消せ。</div>
        <span class="card-badge">TETRIS</span>
      </div>
    </a>
    <a class="card" href="connect4.html">
      <div class="card-preview">🔴</div>
      <div class="card-body">
        <div class="card-title">4目並べ</div>
        <div class="card-desc">CPU または2人対戦。先行・後攻を選んで縦・横・斜めに4つ並べろ。</div>
        <span class="card-badge">CONNECT FOUR</span>
      </div>
    </a>
  </div>
</body>
</html>
