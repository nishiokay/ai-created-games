<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テトリス</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 8px 0 16px;
    }
    canvas {
      display: block;
      width: min(640px, 100vw);
      aspect-ratio: 640 / 448;
      touch-action: none;
    }
    #touch-controls {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    .ctrl-row {
      display: flex;
      gap: 6px;
    }
    .ctrl-btn {
      width: 72px;
      height: 52px;
      background: #0d1b2a;
      border: 1px solid #4488cc;
      border-radius: 8px;
      color: #aaddff;
      font-size: 22px;
      cursor: pointer;
      touch-action: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { background: #1a3a5a; }
    .ctrl-btn.wide { width: 150px; }
  </style>
</head>
<body>
  <canvas id="canvas" width="640" height="448"></canvas>
  <div id="touch-controls">
    <div class="ctrl-row">
      <button class="ctrl-btn" id="tc-left">←</button>
      <button class="ctrl-btn" id="tc-rotate">↺</button>
      <button class="ctrl-btn" id="tc-right">→</button>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="tc-down">↓</button>
      <button class="ctrl-btn wide" id="tc-drop">▼▼ HD</button>
    </div>
  </div>
  <a href="index.html" style="margin-top:12px;color:#444;font:13px sans-serif;text-decoration:none;" onmouseover="this.style.color='#aaa'" onmouseout="this.style.color='#444'">← ゲーム選択に戻る</a>
  <script src="tetris.js"></script>
</body>
</html>
